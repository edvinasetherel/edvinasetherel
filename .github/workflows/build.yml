name: Build README

on:
  push:
    branches:
      - main
    paths:
      - "config.yaml"
      - "config.py"
      - "build.py"
      - "test_build.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
  workflow_dispatch:
    inputs:
      confirm:
        description: "Generate README.md"
        required: false
        default: "yes"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Run tests
        run: uv run python test_build.py

      - name: Build README
        run: uv run python build.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Generate README.md"
          git push
