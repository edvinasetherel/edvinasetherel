name: Build README

on:
  push:
    branches:
      - main
    paths:
      - "config.yaml"
      - "config.py"
      - "build.py"
      - "test_build.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
  workflow_dispatch:

env:
  CHECKOUT_ACTION: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  SETUP_UV_ACTION: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: ${{ env.CHECKOUT_ACTION }}

      - uses: ${{ env.SETUP_UV_ACTION }}

      - name: Run tests
        run: uv run python test_build.py

      - name: Build README
        run: uv run python build.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Generate README.md"
          git push
